name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - run: uv sync --group dev --frozen
      - run: uv run ruff check web/ lib/ tests/
      - run: uv run ruff format --check web/ lib/ tests/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - run: uv sync --group dev --frozen

      - name: Bandit (SAST)
        run: uv run bandit -r web/ lib/ -c pyproject.toml --severity-level medium --confidence-level high -q

      - name: pip-audit
        run: |
          uv export --frozen --no-hashes --no-emit-project > /tmp/requirements.txt
          uv run pip-audit -r /tmp/requirements.txt --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219

      - name: Gitleaks
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          range=""
          if [ "$EVENT" = "pull_request" ]; then
            range="$BASE_SHA..$HEAD_SHA"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            range="$BEFORE_SHA..$AFTER_SHA"
          fi
          if [ -n "$range" ]; then
            ./gitleaks detect --source . -v --log-opts="$range"
          else
            ./gitleaks detect --source . -v
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: autometa
          POSTGRES_PASSWORD: autometa
          POSTGRES_DB: autometa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
    env:
      DATABASE_URL: postgresql://autometa:autometa@localhost:5432/autometa_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - run: uv sync --group dev --frozen
      - name: Unit tests
        run: >-
          uv run --with 'pytest-cov>=7' pytest tests/ -q --tb=short -m "not integration"
          --cov=web --cov=lib --cov-report=term-missing:skip-covered

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Hadolint
        run: |
          curl -sSfL https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64 -o hadolint
          chmod +x hadolint
          ./hadolint Dockerfile --failure-threshold error

      - name: Build
        run: docker build . --tag autometa:ci
