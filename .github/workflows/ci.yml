name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --group dev --frozen
      - run: uv run ruff check web/ lib/ scripts/
      - run: uv run ruff format --check web/ lib/ scripts/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --group dev --frozen

      # SAST — Python security scanner
      - name: Bandit (SAST)
        run: uv run bandit -r web/ lib/ scripts/ -c pyproject.toml --severity-level medium --confidence-level high -q

      # Dependency vulnerability audit
      - name: pip-audit
        run: |
          uv export --frozen --no-hashes > /tmp/requirements.txt
          uv run pip-audit -r /tmp/requirements.txt

      # Secret detection
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --group dev --frozen
      - name: Unit tests
        run: >
          uv run pytest tests/ -q --tb=short -m "not integration"
          --ignore=tests/test_metabase_client.py
          --ignore=tests/test_matomo.py
          --ignore=tests/test_metabase_answers.py
          --ignore=tests/test_notion.py

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dockerfile best practices
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      # Verify the image builds (no push)
      - name: Build
        run: docker build . --tag matometa:ci --no-cache
