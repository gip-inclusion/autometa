[project]
name = "matometa"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    # Web framework
    "fastapi>=0.129.2",
    "uvicorn[standard]>=0.40.0",
    "sse-starlette>=3.1.2",
    "python-multipart>=0.0.21",

    # Claude Agent SDK
    "anthropic>=0.75.0",
    "claude-agent-sdk>=0.1.18",

    # HTTP client (used directly in llm.py)
    "httpx>=0.28.1",

    # Templating
    "jinja2>=3.1.6",
    "markupsafe>=3.0.3",
    "markdown>=3.7",

    # Utils
    "python-dotenv>=1.2.1",
    "click>=8.3.1",
    "requests>=2.32.3",
    "pyyaml>=6.0.2",

    # Validation
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",

    # Database
    "psycopg2-binary>=2.9.10",

    # S3-compatible object storage
    "boto3>=1.35.0",

    # Process management
    "pexpect>=4.9.0",

    # Data analysis
    "numpy>=1.26.0",
    "scipy>=1.11.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.4.0",
    "hmmlearn>=0.3.0",

    # File format support
    "openpyxl>=3.1.0",
    "mammoth>=1.6.0",
    "pdfplumber>=0.10.0",
]

[project.optional-dependencies]
embeddings = [
    "sentence-transformers>=3.0.0",
]
