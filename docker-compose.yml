services:
  matometa:
    build: .
    restart: always
    hostname: matometa
    init: true  # Use tini to reap zombie processes from Claude CLI tool calls
    depends_on:
      - ollama
    # Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    pids_limit: 200
    environment:
      - AGENT_BACKEND=ollama
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3-coder-next
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_PR_TOKEN=${GITHUB_PR_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_WISHLIST_DB=${NOTION_WISHLIST_DB}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - WEB_DEBUG=false
      # Admin users who can see all conversations (comma-separated emails)
      - ADMIN_USERS=${ADMIN_USERS}
    ports:
      - "127.0.0.1:5002:5000"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist Claude credentials between deploys
      - ./claude-credentials:/home/matometa/.claude
      # Stable machine identity for OAuth fingerprinting
      - /etc/machine-id:/etc/machine-id:ro
      # Mount knowledge files (read-only)
      - ./knowledge:/app/knowledge:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./skills:/app/skills:ro
      - ./.claude:/app/.claude:ro

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
