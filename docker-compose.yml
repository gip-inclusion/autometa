services:
  db:
    image: postgis/postgis:18-3.6
    restart: unless-stopped
    environment:
      POSTGRES_USER: autometa
      POSTGRES_PASSWORD: autometa
      POSTGRES_DB: autometa
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/init-prefect-db.sql:/docker-entrypoint-initdb.d/init-prefect-db.sql

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    environment:
      - MINIO_CONSOLE_ADDRESS=:9001
      - MINIO_ROOT_USER=autometa
      - MINIO_ROOT_PASSWORD=autometa
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 3s
      retries: 3

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    environment:
      - MC_HOST_local=http://autometa:autometa@minio:9000
    command: "mb --ignore-existing local/autometa"
    depends_on:
      minio:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  prefect-server:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://autometa:autometa@db:5432/prefect"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  minio_data:
  ollama_data:
