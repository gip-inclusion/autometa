services:
  matometa:
    build: .
    restart: always
    hostname: matometa
    # Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    pids_limit: 200
    environment:
      - AGENT_BACKEND=cli
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_PR_TOKEN=${GITHUB_PR_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_WISHLIST_DB=${NOTION_WISHLIST_DB}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - WEB_DEBUG=false
    ports:
      - "127.0.0.1:5002:5000"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist Claude credentials between deploys
      - ./claude-credentials:/home/matometa/.claude
      # Stable machine identity for OAuth fingerprinting
      - /etc/machine-id:/etc/machine-id:ro
      # Mount knowledge files (read-only)
      - ./knowledge:/app/knowledge:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./skills:/app/skills:ro
      - ./.claude:/app/.claude:ro
      # Static interactive files
      - ./interactive:/app/interactive:ro
