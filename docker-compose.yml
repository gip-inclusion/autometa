services:
  autometa:
    build: .
    restart: always
    hostname: autometa
    init: true  # Use tini to reap zombie processes from Claude CLI tool calls
    # Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    pids_limit: 200
    env_file: .env
    environment:
      # Overrides (take precedence over .env)
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - WEB_DEBUG=false
      # Admin users who can see all conversations (comma-separated emails)
      - ADMIN_USERS=${ADMIN_USERS}
      # Mode expert
      - GITEA_API_TOKEN=${GITEA_API_TOKEN}
      - GITEA_URL=${GITEA_URL:-http://host.docker.internal:3300}
      - GITEA_ORG=${GITEA_ORG:-apps}
      - COOLIFY_URL=${COOLIFY_URL:-http://host.docker.internal:8001}
      - COOLIFY_API_TOKEN=${COOLIFY_API_TOKEN}
      - SKIP_CLI_AUTH_CHECK=${SKIP_CLI_AUTH_CHECK:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5002:5000"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist Claude credentials between deploys
      - ./claude-credentials:/home/autometa/.claude
      # Stable machine identity for OAuth fingerprinting
      - /etc/machine-id:/etc/machine-id:ro
      # Mount knowledge files (read-only)
      - ./knowledge:/app/knowledge:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./skills:/app/skills:ro
      - ./.claude:/app/.claude:ro

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
