services:
  db:
    image: postgis/postgis:18-3.6
    restart: unless-stopped
    environment:
      POSTGRES_USER: autometa
      POSTGRES_PASSWORD: autometa
      POSTGRES_DB: autometa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    environment:
      - MINIO_CONSOLE_ADDRESS=:9001
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    command:
      - |
        mc alias set tmp http://minio:9000 minioadmin minioadmin
        mc admin update --yes local
        mc mb --ignore-existing local/autometa
    depends_on:
      - minio

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  minio_data:
  ollama_data:
