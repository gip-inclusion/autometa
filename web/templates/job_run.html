{% extends "base.html" %}

{% block title_suffix %} - Run{% endblock %}

{% block content %}
<section class="section-content" id="section-job-run">
  <div class="section-header">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between gap-3">
        <div>
          <p class="text-muted mb-1 small"><a href="/jobs">← Jobs</a></p>
          <h1 class="mb-0"><i class="ri-robot-2-line ri-2x text-primary me-2" style="vertical-align: middle;"></i>Run <code>{{ run_id[:8] }}</code></h1>
        </div>
      </div>
    </div>
  </div>

  <div class="section-body">
    <div class="conversation-list-wrapper" style="padding: 1.5rem;">
      <div class="mb-3">
        <span id="status" class="badge bg-secondary">…</span>
        <button id="cancel-btn" class="btn btn-sm btn-outline-danger ms-2 d-none">Annuler</button>
      </div>
      <div id="summary" class="mb-3"></div>
      <div id="artifact" class="mb-3 d-none">
        <div class="d-flex align-items-center gap-2 mb-2">
          <strong class="small text-muted">Artefact</strong>
          <button id="download-btn" class="btn btn-sm btn-outline-secondary">Télécharger</button>
        </div>
        <pre id="artifact-content" class="small p-2 bg-light border rounded" style="max-height: 480px; overflow: auto; white-space: pre-wrap;"></pre>
      </div>
      <h2 class="h6 text-muted">Déroulé</h2>
      <ul id="events" class="list-unstyled small"></ul>
    </div>
  </div>
</section>

<script>
const RUN_ID = "{{ run_id }}";
const TERMINAL = ["completed", "failed", "cancelled", "timed_out", "quota_blocked"];
let timer = null;
let polling = false;
let artifactLoaded = false;

async function loadArtifact() {
  if (artifactLoaded) return;
  artifactLoaded = true;
  const resp = await fetch(`/api/jobs/runs/${RUN_ID}/output`);
  if (!resp.ok) { artifactLoaded = false; return; }
  document.getElementById('artifact-content').textContent = await resp.text();
  document.getElementById('artifact').classList.remove('d-none');
}

function renderEvent(ev) {
  const li = document.createElement('li');
  li.className = 'mb-1';
  let detail = '';
  if (ev.event_type === 'assistant_message' && ev.payload && ev.payload.blocks) {
    detail = ev.payload.blocks.filter(b => b.type === 'text').map(b => b.text).join(' ');
  } else {
    detail = JSON.stringify(ev.payload || {});
  }
  const code = document.createElement('code');
  code.textContent = ev.event_type;
  li.appendChild(code);
  li.append(' ' + detail);
  return li;
}

async function poll() {
  if (polling) return;
  polling = true;
  try {
    const [runResp, evResp] = await Promise.all([
      fetch(`/api/jobs/runs/${RUN_ID}`),
      fetch(`/api/jobs/runs/${RUN_ID}/events`),
    ]);
    if (runResp.ok) {
      const run = await runResp.json();
      document.getElementById('status').textContent = run.status;
      document.getElementById('summary').textContent = run.summary || '';
      if (run.error_text) { document.getElementById('summary').textContent = run.error_text; }
      if (run.output_uri && TERMINAL.includes(run.status)) {
        loadArtifact();
      }
      const cancelBtn = document.getElementById('cancel-btn');
      cancelBtn.classList.toggle('d-none', TERMINAL.includes(run.status));
      if (TERMINAL.includes(run.status) && timer) { clearInterval(timer); timer = null; }
    }
    if (evResp.ok) {
      const events = await evResp.json();
      const ul = document.getElementById('events');
      ul.innerHTML = '';
      events.forEach(ev => ul.appendChild(renderEvent(ev)));
    }
  } finally {
    polling = false;
  }
}

document.getElementById('cancel-btn').addEventListener('click', async () => {
  await fetch(`/api/jobs/runs/${RUN_ID}/cancel`, {method: 'POST'});
  poll();
});

document.getElementById('download-btn').addEventListener('click', async () => {
  const resp = await fetch(`/api/jobs/runs/${RUN_ID}/output?download=1`);
  if (resp.ok) { window.location = (await resp.json()).url; }
});

poll();
timer = setInterval(poll, 3000);
</script>
{% endblock %}
