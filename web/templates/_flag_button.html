{% set is_flagged = current_conv and current_conv.flagged_at %}
{% set is_my_flag = is_flagged and current_conv.flag_user_id == user_email %}
{% set can_act = (not is_flagged) or is_admin or current_conv.user_id == user_email or is_my_flag %}
<button type="button"
        class="chat-flag-btn{% if is_flagged %} flagged{% endif %}"
        id="chatFlagBtn"
        title="{% if can_act %}Signaler un problème{% else %}Signalement déjà émis par {{ current_conv.flag_user_id }}{% endif %}"
        data-current-reason="{{ current_conv.flag_reason or '' }}"
        {% if is_my_flag %}data-is-my-flag="1"{% endif %}
        {% if not can_act %}disabled{% endif %}
        hx-on:click="openFlagDialog(this)">
  <i class="{% if is_flagged %}ri-flag-fill{% else %}ri-flag-line{% endif %}" aria-hidden="true"></i>
</button>
