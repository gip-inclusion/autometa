<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Matometa{% block title_suffix %}{% endblock %}</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Itou design system -->
  <link rel="stylesheet" href="https://emplois.inclusion.beta.gouv.fr/static/css/itou.css">

  <!-- Bootstrap JS dependencies -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  {% block head %}{% endblock %}
</head>

<body class="l-authenticated">
  <!-- Skip links -->
  <nav role="navigation" aria-label="Acces rapide" tabindex="0" class="c-skiplinks">
    <ul>
      <li><a href="#nav-primary">Aller au menu principal</a></li>
      <li><a href="#main">Aller au contenu principal</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header role="banner" id="header">
    <section class="s-header-authenticated">
      <div class="s-header-authenticated__container container">
        <div class="s-header-authenticated__row row">
          <div class="s-header-authenticated__col s-header-authenticated__col--logo-service col-auto d-flex align-items-center pe-0">
            <a href="/"><span class="logo-text">Matometa</span></a>
          </div>
          <div class="s-header-authenticated__col s-header-authenticated__col--nav col d-flex align-items-center justify-content-end pe-0">
            <nav role="navigation" id="nav-primary" aria-label="Navigation principale">
              <ul>
                <li class="d-none d-lg-inline-block">
                  <span class="badge bg-light text-dark">
                    <i class="ri-terminal-line"></i>
                    Local
                  </span>
                </li>
              </ul>
            </nav>
          </div>
          <div class="s-header-authenticated__col s-header-authenticated__col--burger col-auto d-flex align-items-center ps-0">
            <button type="button" class="btn btn-link btn-ico pe-0" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav" aria-label="Ouvrir le menu">
              <i class="ri-menu-line" aria-hidden="true"></i>
              <span>Menu</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Offcanvas menu -->
    <div class="offcanvas offcanvas-start" id="offcanvasNav" aria-label="Navigation principale">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Matometa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column">
        <nav class="flex-grow-1" role="navigation" aria-label="Navigation principale">
          <ul class="nav nav-tabs flex-column menu-nav" id="menuList">
            <li class="nav-item">
              <a href="/explorations" class="nav-link {% if section == 'explorations' %}active{% endif %}">
                <i class="ri-compass-discover-line" aria-hidden="true"></i>
                <span>Explorations</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="/connaissances" class="nav-link {% if section == 'connaissances' %}active{% endif %}">
                <i class="ri-book-open-line" aria-hidden="true"></i>
                <span>Connaissances</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="s-main" role="main" id="main">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

  <!-- App JS -->
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
