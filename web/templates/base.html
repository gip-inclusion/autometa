<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Matometa{% block title_suffix %}{% endblock %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/ico">

  <!-- Itou Theme CSS -->
  <link rel="stylesheet" href="https://emplois.inclusion.beta.gouv.fr/static/css/itou.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/gip-inclusion/itou-theme@v1.4.5/dist/stylesheets/app.css">

  <!-- htmx -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  {% block head %}{% endblock %}
</head>

<body id="top" class="has-sidebar">
  <nav role="navigation" aria-label="Accès rapide" tabindex="0" class="c-skiplinks">
    <ul>
      <li><a href="#nav-primary">Aller au menu principal</a></li>
      <li><a href="#main">Aller au contenu principal</a></li>
    </ul>
  </nav>

  <!-- Fixed sidebar (desktop) -->
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-brand">
        <i class="ri-bar-chart-box-line"></i>
        <span>Matometa</span>
      </a>
    </div>

    <nav class="sidebar-nav" role="navigation" id="nav-primary" aria-label="Navigation principale">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a href="/explorations" class="nav-link {% if section == 'explorations' %}active{% endif %}"
             hx-get="/explorations" hx-target="#main" hx-select="#main > *" hx-push-url="true">
            <i class="ri-compass-discover-line" aria-hidden="true"></i>
            <span>Explorations</span>
          </a>
        </li>

        <li class="nav-item">
          <a href="/connaissances" class="nav-link {% if section == 'connaissances' %}active{% endif %}"
             hx-get="/connaissances" hx-target="#main" hx-select="#main > *" hx-push-url="true">
            <i class="ri-book-open-line" aria-hidden="true"></i>
            <span>Connaissances</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Mobile header (only visible on small screens) -->
  <header class="app-header-mobile d-lg-none">
    <a href="/" class="header-brand">
      <i class="ri-bar-chart-box-line"></i>
      <span>Matometa</span>
    </a>
    <button type="button" class="btn btn-link" data-bs-toggle="offcanvas" data-bs-target="#mobileNav" aria-label="Menu">
      <i class="ri-menu-line ri-lg"></i>
    </button>
  </header>

  <!-- Mobile offcanvas (only for mobile) -->
  <div class="offcanvas offcanvas-start d-lg-none" id="mobileNav" tabindex="-1">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">
        <i class="ri-bar-chart-box-line me-2"></i>Matometa
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
    </div>
    <div class="offcanvas-body">
      <nav role="navigation">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a href="/explorations" class="nav-link {% if section == 'explorations' %}active{% endif %}">
              <i class="ri-compass-discover-line me-2"></i>Explorations
            </a>
          </li>
          <li class="nav-item">
            <a href="/connaissances" class="nav-link {% if section == 'connaissances' %}active{% endif %}">
              <i class="ri-book-open-line me-2"></i>Connaissances
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>

  <!-- Main content area -->
  <main class="app-main" role="main" id="main">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

  <!-- App JS -->
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
