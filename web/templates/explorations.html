{% extends "base.html" %}

{% block title_suffix %} - Explorations{% endblock %}

{% block content %}
<section class="section-content" id="section-explorations">
  <div class="section-header">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
          <i class="ri-compass-discover-line ri-2x text-primary"></i>
          <div>
            <h1 class="mb-0">Explorations</h1>
            <p class="text-muted mb-0">Interrogez vos donnees Matomo et Metabase</p>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <label class="form-check-label small text-muted" for="hideToolsToggle">
            Masquer les details techniques
          </label>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="hideToolsToggle">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container section-body">
    <!-- Chat output area -->
    <div class="chat-output" id="chatOutput">
      <div class="empty-state" id="emptyState">
        <i class="ri-chat-3-line"></i>
        <p>Posez une question pour commencer</p>
      </div>
    </div>
  </div>

  <!-- Chat input bar -->
  <div class="chat-bar-container">
    <div class="container">
      <div class="chat-bar">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Posez une question sur vos donnees..."
          rows="1"
        ></textarea>
        <button type="button" class="chat-send-btn" id="chatSendBtn" title="Envoyer">
          <i class="ri-send-plane-fill"></i>
        </button>
        <button type="button" class="chat-cancel-btn" id="chatCancelBtn" title="Annuler" style="display: none;">
          <i class="ri-stop-fill"></i>
        </button>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  // Initialize chat when DOM is ready
  document.addEventListener('DOMContentLoaded', () => {
    initChat();
  });
</script>
{% endblock %}
