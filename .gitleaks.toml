# Why: les valeurs RPE allowlistées ne sont pas des secrets. `lib/rpe_gwt.py` contient les gabarits
# de requêtes GWT capturés du tableau de bord PUBLIC de France Travail
# (pilotage-rpe.francetravail.org) : sid de session publique et hash de build GWT (le mot de passe y
# est un placeholder `__RPE_PASS__`). Les fixtures de test contiennent des cube_key/cube_id
# synthétiques (hex 32). Le mot de passe public est fourni par l'environnement (RPE_PUBLIC_PASS),
# jamais commité — aucun secret réel n'est exposé.
[extend]
useDefault = true

[allowlist]
description = "RPE public-dashboard captured GWT request templates & synthetic test fixtures"
paths = [
  '''lib/rpe_gwt\.py''',
  '''tests/test_rpe_gwt\.py''',
]
