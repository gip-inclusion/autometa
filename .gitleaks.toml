# Why: les identifiants RPE ne sont pas des secrets — compte « public » d'un tableau de bord
# PUBLIC de France Travail (pilotage-rpe.francetravail.org), transmis en clair dans l'URL
# publique. `lib/rpe_gwt.py` contient les gabarits de requêtes GWT capturés (sid de session
# publique, hash de build GWT) ; le mot de passe y est un placeholder `__RPE_PASS__`. Aucun
# secret réel n'est exposé.
[extend]
useDefault = true

[allowlist]
description = "RPE public-dashboard public-user credentials & captured request templates"
paths = [
  '''lib/rpe_gwt\.py''',
]
regexes = [
  '''yYjL2p''',
]
