# Why: les identifiants RPE ne sont pas des secrets — compte « public » d'un tableau de bord
# PUBLIC de France Travail (pilotage-rpe.francetravail.org), transmis en clair dans l'URL
# publique. `lib/rpe_templates.json` ne contient que des gabarits de requêtes capturés
# (sid de session publique, hash de build GWT, cube ids) ; le mot de passe y est un
# placeholder `__RPE_PASS__`. Aucun secret réel n'est exposé.
[extend]
useDefault = true

[allowlist]
description = "RPE public-dashboard public-user credentials & captured request templates"
paths = [
  '''lib/rpe_templates\.json''',
]
regexes = [
  '''yYjL2p''',
]
