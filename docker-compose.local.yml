services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: matometa
      POSTGRES_PASSWORD: matometa
      POSTGRES_DB: matometa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matometa"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create the S3 bucket on startup
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/matometa --ignore-existing;
      mc anonymous set download local/matometa;
      exit 0;
      "

  matometa:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      - AGENT_BACKEND=cli
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_PR_TOKEN=${GITHUB_PR_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_WISHLIST_DB=${NOTION_WISHLIST_DB}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - WEB_DEBUG=true
      - ADMIN_USERS=${ADMIN_USERS}
      # PostgreSQL
      - DATABASE_URL=postgresql://matometa:matometa@postgres:5432/matometa
      # S3 (MinIO)
      - S3_BUCKET=matometa
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION=us-east-1
    ports:
      - "127.0.0.1:5002:5000"
    volumes:
      - ./claude-credentials:/home/matometa/.claude
      - /etc/machine-id:/etc/machine-id:ro
      - ./knowledge:/app/knowledge:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./skills:/app/skills:ro
      - ./.claude:/app/.claude:ro
      # Local data directory for agent-created files (fallback when S3 miss)
      - ./data:/app/data

volumes:
  postgres_data:
  minio_data:
