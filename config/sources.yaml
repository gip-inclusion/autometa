  datalake:
    url: https://datalake.inclusion.beta.gouv.fr/
    api_key: ${env.METABASE_DATALAKE_API_KEY}
    knowledge_path: knowledge/datalake/
    dashboards:
      20: null  # Suivi de la rétention et de la croissance
      21: null  # Recherche de contacts et structures
      24: null  # Utilisateurs Communs Emplois - Dora

  dora:
    url: https://metabase.dora.inclusion.gouv.fr
    api_key: ${env.METABASE_DORA_API_KEY}
    knowledge_path: knowledge/dora/
    dashboards: {}

  rdvi:
    url: https://rdv-service-public-metabase.osc-secnum-fr1.scalingo.io
    api_key: ${env.METABASE_RDVI_API_KEY}
    knowledge_path: knowledge/rdvi/
    dashboards: {}

