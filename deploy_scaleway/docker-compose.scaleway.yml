# Scaleway deployment: matometa + expert mode (Gitea + browser smoke tests)
# Combined from docker-compose.yml + docker-compose.expert.yml
#
# Usage:
#   docker compose -f deploy/docker-compose.scaleway.yml up -d
#   bash scripts/setup_expert_test.sh   # first-time only

services:
  # ── Matometa ───────────────────────────────────────────────────────
  matometa:
    build: .
    restart: always
    hostname: matometa
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    pids_limit: 200
    env_file: .env
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - WEB_DEBUG=false
      - ADMIN_USERS=${ADMIN_USERS}
      # Expert mode
      - GITEA_API_TOKEN=${GITEA_API_TOKEN}
      - GITEA_URL=${GITEA_URL:-http://host.docker.internal:3300}
      - GITEA_ORG=${GITEA_ORG:-apps}
      - EXPERT_DEPLOY_PUBLIC_HOST=${EXPERT_DEPLOY_PUBLIC_HOST:?Set EXPERT_DEPLOY_PUBLIC_HOST in .env}
      - SKIP_CLI_AUTH_CHECK=${SKIP_CLI_AUTH_CHECK:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:5002:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./claude-credentials:/home/matometa/.claude
      - /etc/machine-id:/etc/machine-id:ro
      - ./knowledge:/app/knowledge:ro
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./skills:/app/skills:ro
      - ./.claude:/app/.claude:ro
    networks:
      - default

  # ── Gitea (lightweight git hosting) ────────────────────────────────
  gitea:
    image: gitea/gitea:latest
    container_name: matometa-gitea
    restart: unless-stopped
    ports:
      - "0.0.0.0:3300:3000"
      - "0.0.0.0:2222:22"
    volumes:
      - gitea_data:/data
    environment:
      - GITEA__server__ROOT_URL=${GITEA_PUBLIC_URL:-http://${EXPERT_DEPLOY_PUBLIC_HOST}:3300}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__api__ENABLE_SWAGGER=false
      - GITEA__webhook__ALLOW_LOCALNETWORKS=true
      - GITEA__webhook__ALLOWED_HOST_LIST=coolify,host.docker.internal,localhost,127.0.0.1
      - GITEA__security__INSTALL_LOCK=true
    networks:
      - default

  # ── Browser sidecar (agent-browser for smoke tests) ──────────────
  browser:
    image: node:20-slim
    container_name: matometa-browser
    restart: unless-stopped
    entrypoint: >
      sh -c "npm install -g agent-browser &&
             npx agent-browser install --with-deps 2>/dev/null;
             echo 'Browser sidecar ready';
             tail -f /dev/null"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/smoke-results:/data/smoke-results
    networks:
      - default
    mem_limit: 512m

networks: {}

volumes:
  gitea_data:
